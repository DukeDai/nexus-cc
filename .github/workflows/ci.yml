name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Match pyproject.toml `requires-python = ">=3.12"`. The local .venv
        # uses 3.12; expand the matrix here if we officially support more.
        python-version: ["3.12"]

    env:
      # Keep ANSI / Rich output sane in the GitHub Actions log viewer.
      PYTHONUNBUFFERED: "1"
      NO_COLOR: "1"
      # Anthropic SDK key is OPTIONAL in CI: real-LLM smoke tests are skipped
      # when unset (see tests/integration/test_real_llm_smoke.py).
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps
        # pytest-cov is intentionally NOT in [project.optional-dependencies]
        # in pyproject.toml yet; install it explicitly here. If/when we add it
        # to the [test] extras, drop the explicit install.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest-cov

      - name: Verify installed package is importable
        run: |
          python -c "import src; print('src package OK from', src.__file__)"

      - name: Run tests with coverage
        # Coverage source + fail_under are configured in pyproject.toml. CLI
        # overrides are intentionally minimal here so the gate stays in one
        # place; bump fail_under in pyproject.toml as the suite grows.
        # Current measured (local): ~21.4%; floor at 20% in pyproject.toml.
        run: |
          python -m pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=junit.xml \
            -v \
            tests/

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            junit.xml
          retention-days: 14

      - name: Upload coverage to Codecov (optional)
        # Only runs if CODECOV_TOKEN is configured in repo secrets.
        # Safe to leave enabled: the action no-ops without a token.
        if: matrix.python-version == '3.12'
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
