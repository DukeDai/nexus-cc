[mypy-context.*]
ignore_missing_imports = True

[mypy-self_evolution.*]
ignore_missing_imports = True

[mypy-llm.*]
ignore_missing_imports = True

[mypy-engine.*]
ignore_missing_imports = True

[mypy-verification.*]
ignore_missing_imports = True
