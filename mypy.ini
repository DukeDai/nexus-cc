[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True

[mypy-anthropic.*,openai.*,requests.*,pydantic.*,rich.*,click.*,pytest.*]
ignore_missing_imports = True

# Suppress namespace package import errors (project uses src/ layout)
[mypy-ralphloop.*]
ignore_missing_imports = True

[mypy-context.*]
ignore_missing_imports = True

[mypy-self_evolution.*]
ignore_missing_imports = True

[mypy-llm.*]
ignore_missing_imports = True

[mypy-engine.*]
ignore_missing_imports = True

[mypy-verification.*]
ignore_missing_imports = True

[mypy-agents.*]
ignore_missing_imports = True

[mypy-hooks.*]
ignore_missing_imports = True

[mypy-mcp.*]
ignore_missing_imports = True

[mypy-cli.*]
ignore_missing_imports = True

[mypy-tui.*]
ignore_missing_imports = True

[mypy-session.*]
ignore_missing_imports = True
